name: Build Android APK

# Builds the SMS-gateway debug APK whenever code under android/ changes.
# Download the APK from the workflow run's Artifacts section.
on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EleganskySmsGateway-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
